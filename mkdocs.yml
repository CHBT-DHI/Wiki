site_name: WEST Documentation Wiki
site_description: User documentation for WEST — DHI's wastewater process modelling tool
site_author: DHI
repo_url: https://github.com/chbt-dhi/wiki
repo_name: chbt-dhi/wiki
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Starter Kit:
    - starter-kit/index.md
    - FAQ: starter-kit/faq.md
    - Quick Start Tutorial: starter-kit/quick-start.md
    - Glossary: starter-kit/glossary.md
  - Manuals:
    - manuals/index.md
    - Installation: manuals/installation.md
    - Running Simulations: manuals/running-simulations.md
    - Advanced Simulations: manuals/advanced-simulations.md
    - Controllers: manuals/controllers.md
    - Results and Output: manuals/results-output.md
    - Worked Examples: manuals/worked-examples.md
  - Technical Reference:
    - technical-reference/index.md
    - Process Models: technical-reference/process-models.md
    - Components and Processes: technical-reference/components-processes.md
    - Influent Characterisation: technical-reference/influent-characterisation.md
    - Process Units: technical-reference/process-units.md
  - Advanced Topics:
    - advanced-topics/index.md
    - Calibration: advanced-topics/calibration.md
    - Scenario Management: advanced-topics/scenario-management.md
    - Performance and Large Models: advanced-topics/performance.md
  - Developer Topics:
    - developer-topics/index.md
    - Custom Models: developer-topics/custom-models.md
    - Extending WEST: developer-topics/extending-west.md
  - Automation & API:
    - automation-api/index.md
    - Getting Started with the API: automation-api/getting-started.md
    - Running Simulations Programmatically: automation-api/running-simulations.md
    - Batch Workflows: automation-api/batch-workflows.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chbt-dhi/wiki
