site_name: WEST Documentation Wiki
site_description: User documentation for WEST — DHI's wastewater process modelling tool
site_author: DHI
repo_url: https://github.com/chbt-dhi/wiki
repo_name: chbt-dhi/wiki
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Quick Start Tutorial: getting-started/quick-start.md
    - The WEST Interface: getting-started/interface-overview.md
    - Glossary: getting-started/glossary.md
    - FAQ: getting-started/faq.md
  - How-To Guides:
    - how-to/index.md
    - Installation & Licensing: how-to/installation.md
    - Building a Plant Layout: how-to/building-layouts.md
    - Managing Input Data: how-to/managing-input-data.md
    - Running Simulations: how-to/running-simulations.md
    - Results & Output: how-to/results-and-output.md
    - Controllers: how-to/controllers.md
    - Reports: how-to/reports.md
  - Experiment Types:
    - experiment-types/index.md
    - Sensitivity Analysis: experiment-types/sensitivity-analysis.md
    - Parameter Estimation: experiment-types/parameter-estimation.md
    - Scenario Analysis: experiment-types/scenario-analysis.md
    - Uncertainty Analysis: experiment-types/uncertainty-analysis.md
  - Block Reference:
    - block-reference/index.md
    - Choosing a Biological Model: block-reference/choosing-a-model.md
    - Biological Models: block-reference/biological-models.md
    - Activated Sludge Tanks: block-reference/activated-sludge-tanks.md
    - Clarifiers: block-reference/clarifiers.md
    - Sludge Treatment: block-reference/sludge-treatment.md
    - Aeration: block-reference/aeration.md
    - Flow Management: block-reference/flow-management.md
    - Controllers & Timers: block-reference/controllers-timers.md
    - Sensors & Signal Treatment: block-reference/sensors-signal.md
    - Advanced Processes: block-reference/advanced-processes.md
  - Worked Examples:
    - worked-examples/index.md
    - TwoASU MLE Layout: worked-examples/twoasu-mle.md
    - Plant-Wide Model: worked-examples/plant-wide-model.md
    - Integrated Urban Water System: worked-examples/iuws.md
  - WEST Tools:
    - west-tools/index.md
    - Model Editor: west-tools/model-editor.md
    - Block Editor: west-tools/block-editor.md
    - Data Editor: west-tools/data-editor.md
    - Designer: west-tools/designer.md
    - Unit Editor: west-tools/unit-editor.md
  - Automation & API:
    - automation-api/index.md
    - Getting Started with the API: automation-api/getting-started.md
    - Running Simulations Programmatically: automation-api/running-simulations.md
    - Batch Workflows: automation-api/batch-workflows.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chbt-dhi/wiki
